<!--
  Neo Brutalism 微信公众号模板
  高对比、粗边框、硬阴影、直接表达
-->

<section style="max-width: 100%; margin: 0 auto; padding: 0; font-family: 'Arial Black', 'Helvetica Neue', 'PingFang SC', sans-serif; background: #fffdf7;">

<section style="background: #ffd84d; padding: 24px 18px 20px; border: 4px solid #111111; box-shadow: 8px 8px 0 #111111;">
<p style="font-size: 11px; color: #111111; letter-spacing: 3px; text-transform: uppercase; margin: 0 0 10px; font-weight: 900;">NEO BRUTALISM ISSUE</p>
<p style="font-size: 31px; font-weight: 900; color: #111111; line-height: 1.04; margin: 0 0 12px;">{{TITLE}}</p>
<p style="font-size: 14px; color: #111111; line-height: 1.75; margin: 0;">{{DIGEST}}</p>
<section style="margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px;">
<section style="display: inline-block; padding: 6px 10px; background: #ffffff; border: 3px solid #111111; font-size: 11px; font-weight: 800; color: #111111;">{{DATE_SHORT}}</section>
<section style="display: inline-block; padding: 6px 10px; background: #ff7a00; border: 3px solid #111111; font-size: 11px; font-weight: 800; color: #111111;">{{NEWS_COUNT}} STORIES</section>
<section style="display: inline-block; padding: 6px 10px; background: #ffffff; border: 3px solid #111111; font-size: 11px; font-weight: 800; color: #111111;">BY {{AUTHOR}}</section>
</section>
</section>

<section style="height: 14px;"></section>

<section style="background: #ffffff; padding: 22px 18px 18px; border: 4px solid #111111; box-shadow: 8px 8px 0 #00c2ff;">
<p style="font-size: 11px; color: #111111; letter-spacing: 3px; text-transform: uppercase; margin: 0 0 10px; font-weight: 900;">MAIN HIT</p>
<p style="font-size: 28px; font-weight: 900; color: #111111; line-height: 1.15; margin: 0 0 14px;">{{HEADLINE_TITLE}}</p>
{{HEADLINE_BODY}}
<p style="font-size: 11px; color: #111111; margin: 12px 0 0; font-weight: 800;">{{HEADLINE_SOURCE}}</p>
</section>

{{HEADLINE_IMAGE}}
{{BODY_SECTIONS}}

<section style="padding: 10px 18px 0;">
<section style="background: #ff5fa2; padding: 16px; border: 4px solid #111111; box-shadow: 8px 8px 0 #111111;">
<p style="font-size: 11px; color: #111111; letter-spacing: 3px; text-transform: uppercase; margin: 0 0 10px; font-weight: 900;">BOTTOM LINE</p>
<p style="font-size: 15px; color: #111111; line-height: 1.82; margin: 0; font-weight: 700;">{{CONCLUSION}}</p>
</section>
</section>

<section style="padding: 14px 18px 34px;">
<section style="background: #ffffff; padding: 16px; border: 4px solid #111111; box-shadow: 8px 8px 0 #ff7a00;">
<p style="font-size: 15px; color: #111111; line-height: 1.82; margin: 0; font-weight: 700;">{{CTA}}</p>
</section>
</section>

</section>
